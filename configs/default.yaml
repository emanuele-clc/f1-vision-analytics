# Configurazione F1 Strategy & ML

data:
  cache: ".fastf1_cache"
  default_year: 2024
  default_gp: "Monza"
  default_session: "R"

model:
  path: "models/laptime_model.joblib"
  cv_folds: 5

strategy:
  pit_loss_s: 22.0
  max_stops: 2
  min_stint: 5
  require_two_compounds: true
  compounds: ["SOFT", "MEDIUM", "HARD"]

replay:
  step_s: 1.0
